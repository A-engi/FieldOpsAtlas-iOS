    <g class="legend-item" transform="translate(229 26)">
      <circle r="10" fill="url(#redMarker)" stroke="#6f6557" stroke-width="1.25" filter="url(#dotShadow)" />
      <text x="24" y="6">Relay</text>
    </g>

    <g class="legend-item" transform="translate(335 26)">
      <circle r="10" fill="url(#blueMarker)" stroke="#6f6557" stroke-width="1.25" filter="url(#dotShadow)" />
      <text x="24" y="6">Remote</text>
    </g>

    <g class="legend-item" transform="translate(463 26)">
      <circle r="10" fill="url(#offlineMarker)" stroke="#6f6557" stroke-width="1.25" filter="url(#dotShadow)" />
      <text x="24" y="6">Offline</text>
