    <path class="relay-halo-line strong" d="M38.0 0.0L82.0 0.0 M32.9 19.0L71.0 41.0 M19.0 32.9L41.0 71.0 M0.0 38.0L0.0 82.0 M-19.0 32.9L-41.0 71.0 M-32.9 19.0L-71.0 41.0 M-38.0 0.0L-82.0 0.0 M-32.9 -19.0L-71.0 -41.0 M-19.0 -32.9L-41.0 -71.0 M-0.0 -38.0L-0.0 -82.0 M19.0 -32.9L41.0 -71.0 M32.9 -19.0L71.0 -41.0 M-82 0L82 0 M0 -82L0 82" />
