<svg xmlns="http://www.w3.org/2000/svg" viewBox="43 101 1604.32 923" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">

<title id="title">Network Graph Area Only wide layout</title>
<desc id="desc">A standalone SVG network map widened to fit the RF page without stretching icons, markers, or labels.</desc>

<style>
  /* =======================================================
     SVG STYLE SYSTEM
     Pure SVG. No HTML wrapper. No CSS variables.
     ======================================================= */

  .map-bg{ fill:#E5DDD2; }
  .map-edge{ fill:none; stroke:#d0a85d; stroke-width:3; opacity:.9; }
  .map-inner-edge{ fill:none; stroke:#fff1c8; stroke-width:2; opacity:.55; }

  .coord-line{ stroke:#806b45; stroke-width:1; opacity:.28; }
  .coord-text{ fill:#806b45; font:700 12px Arial,sans-serif; opacity:.62; }

  .route{
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .route.main{ stroke-width:4.2; filter:url(#pathShadow); }
  .route.soft{ stroke-width:6.2; opacity:.14; }
  .route.green.main{ stroke:#13682b; }
  .route.green.soft{ stroke:#164d2a; }
  .route.blue.main{ stroke:#1c5aaf; }
  .route.blue.soft{ stroke:#103e76; }
  .route.teal{ stroke:#427c7b; stroke-width:3.4; opacity:.9; filter:url(#pathShadow); }

  .route.red.glow{ stroke:#fa7a45; stroke-width:15; opacity:.45; filter:url(#redGlow); }
  .route.red.outer{ stroke:#d73120; stroke-width:9.6; filter:url(#pathShadow); }
  .route.red.white{ stroke:#fff5da; stroke-width:4.3; opacity:.96; }
  .route.red.core{ stroke:#d73120; stroke-width:1.55; opacity:.95; }

  .route-dot circle{
    fill:#f7efd3;
    stroke-width:4;
  }

  .route-dot.green circle{ stroke:#176e2f; }
  .route-dot.blue circle{ stroke:#1e62ae; }

  .red-route-dot{ filter:url(#redDotGlow); }
  .red-route-dot .outer{ fill:#d72d1e; stroke:#fff8e6; stroke-width:1.8; }
  .red-route-dot .middle{ fill:#fff8e6; }
  .red-route-dot .inner{ fill:#d72d1e; }

  .marker{ filter:url(#markerShadow); }
  .marker .halo{ opacity:.55; }
  .marker .fill{ stroke-width:4; }
  .marker .ring{ fill:none; stroke-width:2; opacity:.55; }
  .marker .icon{ color:#fff7de; }

  .marker.core .halo,
  .marker.main .halo{ fill:#e8d9a0; }
  .marker.core .fill,
  .marker.main .fill{ fill:#106228; stroke:#5E6E51; }
  .marker.core .ring,
  .marker.main .ring{ stroke:#5E6E51; }

  .marker.remote .halo{ fill:#d7c88f; opacity:.35; }
  .marker.remote .fill{ fill:#1B4D81; stroke:#5B7289; }
  .marker.remote .ring{ stroke:#5B7289; }

  .marker.relay .halo{ fill:#ff5d32; opacity:.16; filter:url(#redGlow); }
  .marker.relay .fill{ fill:#9F231A; stroke:#8E575D; stroke-width:4.5; }
  .marker.relay .ring{ stroke:#8E575D; }

  .marker.worker .halo{ fill:#e8d9a0; opacity:.5; }
  .marker.worker.remote .halo{ fill:#d7c88f; opacity:.45; }

  .relay-halo-line{
    fill:none;
    stroke:#d73b23;
    stroke-width:1.15;
    stroke-linecap:round;
    opacity:.22;
  }

  .relay-halo-line.strong{ stroke-width:1.55; opacity:.28; }
  .relay-halo-ring{ fill:none; stroke:#d73b23; stroke-width:1.1; opacity:.18; }

  .site-label{
    font-family:'Arial Narrow','Roboto Condensed','Helvetica Neue Condensed',Impact,sans-serif;
    paint-order:stroke fill;
    stroke:#efe5cf;
  }

  .site-label .name{
    font-size:27px;
    font-weight:760;
    letter-spacing:.65px;
    fill:#172033;
    stroke-width:2px;
  }

  .site-label .type{
    font-size:18px;
    font-weight:820;
    letter-spacing:1.8px;
    stroke-width:1.4px;
  }

  .site-label.core .type,
  .site-label.main .type{ fill:#176e2f; }

  .site-label.relay .type{ fill:#bc2f21; }
  .site-label.remote .type{ fill:#1e62ae; }

  .compass circle,
  .compass path{ fill:none; stroke:#9f8751; }

  .compass-outer{ stroke-width:4; }
  .compass-inner{ stroke-width:2; }
  .compass-lines{ stroke-width:2.2; }
  .compass-star{ stroke-width:2; }

  .compass-label{
    font-family:Georgia, 'Times New Roman', serif;
    font-size:16px;
    fill:#9f8751;
  }

  .legend-panel{
    fill:#efe5d3;
    stroke:#c8a25d;
    stroke-width:1.5;
    filter:url(#legendShadow);
  }

  .legend-item text{
    font-family:'Arial Narrow','Roboto Condensed','Helvetica Neue Condensed',Impact,sans-serif;
    paint-order:stroke fill;
    stroke:#efe5cf;
    font-size:18px;
    font-weight:720;
    letter-spacing:.5px;
    fill:#2a2a28;
    stroke-width:1.3px;
  }
</style>

<defs>
  

  <radialGradient id="greenMarker" cx="36%" cy="30%" r="68%">
    <stop offset="0" stop-color="#34a642" />
    <stop offset=".5" stop-color="#1f812e" />
    <stop offset="1" stop-color="#075919" />
  </radialGradient>

  <radialGradient id="redMarker" cx="36%" cy="30%" r="68%">
    <stop offset="0" stop-color="#ff6443" />
    <stop offset=".5" stop-color="#de341f" />
    <stop offset="1" stop-color="#9d170f" />
  </radialGradient>

  <radialGradient id="blueMarker" cx="36%" cy="30%" r="68%">
    <stop offset="0" stop-color="#4d8fe5" />
    <stop offset=".5" stop-color="#2468b9" />
    <stop offset="1" stop-color="#103f7c" />
  </radialGradient>

  <radialGradient id="offlineMarker" cx="38%" cy="32%" r="68%">
    <stop offset="0" stop-color="#eeeeea" />
    <stop offset=".55" stop-color="#9b9b94" />
    <stop offset="1" stop-color="#575752" />
  </radialGradient>

  <filter id="markerShadow" x="-80%" y="-80%" width="260%" height="260%">
    <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0b1b0e" flood-opacity=".4" />
  </filter>

  <filter id="pathShadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="#000" flood-opacity=".28" />
  </filter>

  <filter id="dotShadow" x="-80%" y="-80%" width="260%" height="260%">
    <feDropShadow dx="0" dy="2" stdDeviation="1.6" flood-color="#000" flood-opacity=".32" />
  </filter>

  <filter id="redGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur" />
      <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>

  <filter id="redDotGlow" x="-90%" y="-90%" width="280%" height="280%">
    <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff5a31" flood-opacity=".7" />
    <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity=".25" />
  </filter>

  <filter id="legendShadow" x="-30%" y="-60%" width="160%" height="220%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6c5529" flood-opacity=".16" />
  </filter>

  

  <path id="green-routes" d="M 241.32 203 L 251.68 340 L 281.28 423 M 265 190 L 488.48 305 L 541.76 352 M 313.84 438 L 503.28 387 M 578.76 358 L 747.48 240 L 987.24 177 M 1025.72 204 L 1108.6 318 L 1181.12 357 M 562.48 420 L 583.2 454 L 602.44 497 M 627.6 571 L 677.92 672 L 754.88 724" />

  <path id="blue-routes" d="M 353.8 712 L 506.24 727 L 737.12 747 M 307.92 681 L 420.4 609 L 546.2 560 M 852.56 764 L 1095.28 769 L 1375 738 M 836.28 737 L 1150.04 620 L 1318.76 551 M 1235.88 406 L 1343.92 506 M 1361.68 565 L 1388.32 650 L 1407.56 716" />

  <path id="teal-route" d="M 312.36 465 L 538.8 582 L 738.6 735" />
  <path id="red-route" d="M 830.36 726 L 929.52 668 L 1076.04 507 L 1179.64 412" />

  

  <g id="mast-icon" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 -18v39" stroke-width="3.2" />
    <path d="M0 -5L-13 23M0 -5L13 23" stroke-width="3.2" />
    <path d="M-9 10H9M-6 0H6M-4 18H4" stroke-width="2.4" />
    <circle cx="0" cy="-20" r="3.8" fill="currentColor" stroke="none" />
    <path d="M-8 -23C-16 -15 -16 -5 -8 4" stroke-width="2.8" />
    <path d="M8 -23C16 -15 16 -5 8 4" stroke-width="2.8" />
    <path d="M-14 -29C-27 -16 -27 4 -14 16" stroke-width="2.4" opacity=".9" />
    <path d="M14 -29C27 -16 27 4 14 16" stroke-width="2.4" opacity=".9" />
  </g>

  <g id="person-icon" fill="currentColor">
