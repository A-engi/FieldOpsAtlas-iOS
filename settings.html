<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FieldOps Atlas Settings v0.1.37-path-optimiser</title>
  <link rel="stylesheet" href="shell.css" />
  <style>
    .phone[data-page="settings"] {
      background:
        radial-gradient(ellipse at 88% 20%, rgba(73, 213, 255, 0.20), transparent 34%),
        radial-gradient(ellipse at 14% 35%, rgba(40, 119, 190, 0.16), transparent 44%),
        linear-gradient(180deg, #071d3f 0%, #061a3a 42%, #041733 100%);
    }

    .phone[data-page="settings"] .content-canvas {
      position: absolute;
      z-index: 1;
      top: calc(var(--safe-top, 0px) + var(--top-height, 54px) + 8px);
      right: 7px;
      bottom: calc(var(--safe-bottom, 0px) + var(--nav-height, 38px) + var(--bottom-lift, 8px) + 7px);
      left: 7px;
      min-height: 0;
      overflow: hidden;
      border: 2px solid var(--gold-border, rgba(237, 191, 99, 0.78));
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 37%, rgba(255, 255, 255, 0.82), transparent 39%),
        linear-gradient(180deg, rgba(255, 253, 246, 0.95) 0%, rgba(251, 242, 223, 0.93) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.68),
        inset 0 0 0 1px rgba(255, 231, 168, 0.26),
        0 -2px 0 rgba(255, 226, 160, 0.20),
        0 0 0 1px rgba(85, 55, 10, 0.14),
        0 14px 30px rgba(2, 9, 20, 0.26);
    }

    .page-content {
      height: 100%;
      min-height: 0;
      padding: 12px;
      display: grid;
      align-content: start;
      gap: 10px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      color: #071c32;
    }

    .page-head,
    .card {
      padding: 12px;
      border: 1px solid rgba(130, 91, 22, 0.13);
      border-radius: 15px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.55), transparent 46%),
        linear-gradient(180deg, rgba(255, 252, 242, 0.84), rgba(248, 236, 211, 0.72));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.52);
    }

    .page-kicker {
      margin-bottom: 5px;
      color: rgba(7, 31, 56, 0.62);
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1;
      text-transform: uppercase;
    }

    .page-title,
    .card-title {
      margin: 0;
      color: #071c32;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 950;
      text-transform: uppercase;
    }

    .page-title {
      font-size: 24px;
      letter-spacing: -0.03em;
      line-height: 0.95;
    }

    .card-title {
      margin-bottom: 9px;
      font-size: 12px;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .page-lede {
      margin: 7px 0 0;
      color: rgba(7, 31, 56, 0.68);
      font-size: 11px;
      font-weight: 650;
      line-height: 1.35;
    }

    .list {
      display: grid;
      gap: 7px;
    }

    .list-row {
      min-height: 46px;
      padding: 8px;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      color: #071c32;
      border: 1px solid rgba(239, 198, 120, 0.58);
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.62), rgba(255, 246, 224, 0.24));
      text-decoration: none;
    }

    .row-title {
      color: #071c32;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 10px;
      font-weight: 950;
      line-height: 1.05;
      text-transform: uppercase;
    }

    .row-sub {
      margin-top: 2px;
      color: rgba(7, 31, 56, 0.64);
      font-size: 7px;
      font-weight: 750;
      line-height: 1.1;
    }

    .row-value {
      color: #1c9570;
      font-size: 7px;
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1;
      text-align: right;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .preference-check {
      width: 21px;
      height: 21px;
      margin: 0;
      accent-color: #16815f;
    }

    .preference-state {
      min-width: 30px;
      display: grid;
      justify-items: center;
      gap: 4px;
    }
  </style>
</head>

<body>
  <main class="phone" data-page="settings" data-nav="tools" data-version="0.1.37-path-optimiser">
    <section class="content-canvas" aria-label="RF Atlas Settings content">
      <article class="page-content">
        <header class="page-head">
          <div class="page-kicker">Control panel</div>
          <h1 class="page-title">Settings</h1>
          <p class="page-lede">Preferences for units, offline data, display, and alerts.</p>
        </header>

        <section class="card">
          <h2 class="card-title">Preferences</h2>
          <div class="list">
            <a class="list-row" href="#"><span class="row-icon">⚙</span><span><b class="row-title">Units and format</b><div class="row-sub">dBm, watts, km, bearings</div></span><span class="row-value">Open</span></a>
            <a class="list-row" href="#"><span class="row-icon">☁</span><span><b class="row-title">Offline data</b><div class="row-sub">Save site data for field use</div></span><span class="row-value">Open</span></a>
            <a class="list-row" href="#"><span class="row-icon">!</span><span><b class="row-title">Alerts</b><div class="row-sub">Faults, warnings, and follow-ups</div></span><span class="row-value">Open</span></a>
          </div>
        </section>

        <section class="card">
          <h2 class="card-title">Map performance</h2>
          <div class="list">
            <label class="list-row" for="optimisePathLayout">
              <span class="row-icon">↗</span>
              <span>
                <b class="row-title">Optimise RF path layout</b>
                <span class="row-sub">Detect crossings and move conflicting longer paths outward. May add a short delay.</span>
              </span>
              <span class="preference-state">
                <input class="preference-check" id="optimisePathLayout" type="checkbox" />
                <span class="row-value" data-path-optimiser-state>On</span>
              </span>
            </label>
          </div>
        </section>
      </article>
    </section>
  </main>

  <script src="shell.js"></script>
  <script>
  (() => {
    "use strict";

    const STORAGE_KEY = "fieldops.maps.optimise-path-layout-v1";
    const checkbox = document.getElementById("optimisePathLayout");
    const state = document.querySelector("[data-path-optimiser-state]");

    function readPreference() {
      try {
        return window.localStorage.getItem(STORAGE_KEY) !== "false";
      } catch (error) {
        return true;
      }
    }

    function updateState() {
      if (state) {
        state.textContent = checkbox.checked ? "On" : "Off";
      }
    }

    checkbox.checked = readPreference();
    updateState();

    checkbox.addEventListener("change", () => {
      try {
        window.localStorage.setItem(STORAGE_KEY, String(checkbox.checked));
      } catch (error) {
        // Local storage may be unavailable in private previews.
      }

      updateState();
    });
  })();
  </script>
</body>
</html>
