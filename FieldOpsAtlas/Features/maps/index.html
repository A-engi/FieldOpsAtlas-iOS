<!doctype html>
<html lang="en">
<head>
  <!-- ==========================================================================
       FieldOps Atlas OSM maps shell page
       File: FieldOpsAtlas/Features/maps/index.html
       Version: 1.0.9-root-shell-restore
       Purpose:
       - Keep the shared root shell visible.
       - Mount the Leaflet OSM map behind shell chrome.
       - Provide only the DOM required by OSMmaps.js and OSMpanes.js.
       ========================================================================== -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FieldOps Atlas - Maps</title>

  <link rel="stylesheet" href="../../../theme.css">
  <link rel="stylesheet" href="../../../components.css">
  <link rel="stylesheet" href="../../../shell.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./OSMmaps.css?v=1.0.9-root-shell-restore">
  <link rel="stylesheet" href="./OSMpanes.css?v=1.0.3">
</head>
<body>
  <div class="osmmaps-page" data-osmmaps-page>
    <main id="OSMmaps" class="osmmaps-canvas" aria-label="UK OSM map"></main>

    <section class="osmmaps-region-overlay" data-region-overlay aria-label="Region selector" hidden>
      <button
        class="osmmaps-overlay-backdrop"
        type="button"
        data-region-overlay-close
        aria-label="Close region selector"
      ></button>

      <div class="osmmaps-filter-card" role="dialog" aria-modal="false" aria-labelledby="osmmapsRegionTitle">
        <div class="osmmaps-filter-header">
          <div>
            <p class="osmmaps-kicker">Filter</p>
            <h1 id="osmmapsRegionTitle">Choose region</h1>
          </div>

          <button class="osmmaps-small-button" type="button" data-region-overlay-close>
            Close
          </button>
        </div>

        <p class="osmmaps-filter-note">
          Only the selected region's walks are loaded.
        </p>

        <div class="osmmaps-region-list" data-region-list aria-label="Available regions"></div>
      </div>
    </section>

    <aside class="osmmaps-details" data-selected-panel aria-live="polite" hidden></aside>
  </div>

  <div class="fieldops-shell-root" data-page="map" data-current-page="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../../../shell.js"></script>
  <script src="./OSMpanes.js?v=1.0.3"></script>
  <script src="./OSMmaps.js?v=1.0.9-root-shell-restore"></script>
</body>
</html>
