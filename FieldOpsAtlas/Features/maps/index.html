 <script>
 /* RF curved path demo | Version: 1.0.26-curved-rf-paths */
 (() => {
  "use strict";

  const VERSION = "1.0.26-curved-rf-paths";
  const REFERENCE_ZOOM = 9;
  const LANE_SPACING = 10;
  const MAX_OFFSET = 90;
  const CURVE_SEGMENTS = 18;
  const BATCH_RESET_MS = 250;

  if (!window.L || typeof window.L.polyline !== "function") {
   return;
  }

  const originalPolyline = window.L.polyline;
  const sourceLaneCounts = new Map();
  let lastRfPathCreatedAt = 0;

  function sourceKey(latlng) {
   return Number(latlng.lat).toFixed(5) + "," + Number(latlng.lng).toFixed(5);
  }

  function nextLaneIndex(fromLatLng) {
   const now = Date.now();

   if (now - lastRfPathCreatedAt > BATCH_RESET_MS) {
    sourceLaneCounts.clear();
   }

   lastRfPathCreatedAt = now;

   const key = sourceKey(fromLatLng);
   const count = sourceLaneCounts.get(key) || 0;
   sourceLaneCounts.set(key, count + 1);

   if (count === 0) {
    return 0;
   }

   const step = Math.ceil(count / 2);
   return count % 2 === 1 ? step : -step;
  }

  function curvedLatLngs(map, fromLatLng, toLatLng, laneIndex) {
   const fromPoint = map.project(fromLatLng, REFERENCE_ZOOM);
   const toPoint = map.project(toLatLng, REFERENCE_ZOOM);
   const dx = toPoint.x - fromPoint.x;
   const dy = toPoint.y - fromPoint.y;
   const length = Math.sqrt(dx * dx + dy * dy) || 1;
   const perpendicularX = -dy / length;
   const perpendicularY = dx / length;
   const offset = Math.max(
    -MAX_OFFSET,
    Math.min(MAX_OFFSET, laneIndex * LANE_SPACING)
   );
   const controlPoint = window.L.point(
    (fromPoint.x + toPoint.x) / 2 + perpendicularX * offset,
    (fromPoint.y + toPoint.y) / 2 + perpendicularY * offset
   );
   const points = [];

   for (let index = 0; index <= CURVE_SEGMENTS; index += 1) {
    const t = index / CURVE_SEGMENTS;
    const inverse = 1 - t;
    const point = window.L.point(
     inverse * inverse * fromPoint.x +
      2 * inverse * t * controlPoint.x +
      t * t * toPoint.x,
     inverse * inverse * fromPoint.y +
      2 * inverse * t * controlPoint.y +
      t * t * toPoint.y
    );

    points.push(map.unproject(point, REFERENCE_ZOOM));
   }

   points[0] = fromLatLng;
   points[points.length - 1] = toLatLng;
   return points;
  }

  function tidyPathStyle(style) {
   const nextStyle = Object.assign({}, style || {});
   const weight = Number(nextStyle.weight);

   if (weight === 5) {
    nextStyle.weight = 3.5;
   } else if (weight >= 8) {
    nextStyle.weight = 7;
   }

   return nextStyle;
  }

  window.L.polyline = function fieldOpsCurvedPolyline(latlngs, options) {
   const isRfPath =
    options &&
    options.pane === "fieldopsRfPaths" &&
    Array.isArray(latlngs) &&
    latlngs.length === 2;

   if (!isRfPath) {
    return originalPolyline.call(this, latlngs, options);
   }

   const map = window.FieldOpsAtlasLeafletMap;
   const fromLatLng = window.L.latLng(latlngs[0]);
   const toLatLng = window.L.latLng(latlngs[1]);

   if (!map || typeof map.project !== "function" || typeof map.unproject !== "function") {
    return originalPolyline.call(this, latlngs, tidyPathStyle(options));
   }

   const laneIndex = nextLaneIndex(fromLatLng);
   const line = originalPolyline.call(
    this,
    curvedLatLngs(map, fromLatLng, toLatLng, laneIndex),
    tidyPathStyle(options)
   );
   const originalSetStyle = line.setStyle;

   line.setStyle = function setCurvedPathStyle(style) {
    return originalSetStyle.call(this, tidyPathStyle(style));
   };

   line.options.fieldOpsCurveLane = laneIndex;
   line.options.fieldOpsCurveVersion = VERSION;
   return line;
  };

  window.L.polyline.__fieldOpsCurveVersion = VERSION;
 })();
 </script>

 <script>
 /* Maps load toast | Version: 1.0.26-curved-rf-paths */
 (() => {
  "use strict";

  const PAGE_VERSION = "1.0.26-curved-rf-paths";
  const TOAST_ID = "mapsLoadToast";

  function versionOf(globalName) {
   const globalValue = window[globalName];

   if (!globalValue) {
    return "missing";
   }

   return globalValue.VERSION || globalValue.version || "loaded";
  }

  function leafletVersion() {
   return window.L && window.L.version ? window.L.version : versionOf("L");
  }

  function showToast() {
   const existingToast = document.getElementById(TOAST_ID);

   if (existingToast) {
    existingToast.remove();
   }

   const toast = document.createElement("div");

   toast.id = TOAST_ID;
   toast.className = "maps-load-toast";
   toast.setAttribute("role", "status");
   toast.setAttribute("aria-live", "polite");

   const lines = [
    `index.html ${PAGE_VERSION}`,
    "shell.css unversioned",
    "background.css fade-restore-20260612g",
    "leaflet.css 1.9.4",
    "OSMmaps.css fade-restore-20260612g",
    "OSMpanes.css fade-restore-20260612g",
    "OSMweather-menu.css 1.0.23-input-svg-assets",
    `shell.js ${versionOf("FieldOpsEditor")}`,
    `leaflet.js ${leafletVersion()}`,
    `rf-curves ${window.L.polyline.__fieldOpsCurveVersion || "missing"}`,
    `OSMpanes.js ${versionOf("FieldOpsOSMpanes")}`,
    `OSMmaps.js ${versionOf("FieldOpsOSMmaps")}`,
    `OSMweather-menu.js ${versionOf("FieldOpsOSMWeatherMenu")}`
   ];

   toast.textContent = lines.join("\n");
   document.body.appendChild(toast);

   requestAnimationFrame(() => {
    toast.classList.add("is-visible");
   });

   window.setTimeout(() => {
    toast.classList.remove("is-visible");
   }, 6500);

   window.setTimeout(() => {
    toast.remove();
   }, 7000);
  }

  if (document.readyState === "loading") {
   document.addEventListener("DOMContentLoaded", () => {
    window.setTimeout(showToast, 450);
   }, { once: true });
  } else {
   window.setTimeout(showToast, 450);
  }
 })();
 </script>
