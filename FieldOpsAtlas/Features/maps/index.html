<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
 <title>Maps v1.0.12-top-attached-tools</title>
 <link rel="stylesheet" href="../../../shell.css">
 <link rel="stylesheet" href="./background.css?v=fade-restore-20260612g">
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
 <link rel="stylesheet" href="./OSMmaps.css?v=fade-restore-20260612g">
 <link rel="stylesheet" href="./OSMpanes.css?v=fade-restore-20260612g">
 <link rel="stylesheet" href="./OSMweather-menu.css?v=1.0.12-top-attached-tools">
 <style>
 .maps-load-toast {
  position: fixed;
  z-index: 9999;
  left: 14px;
  right: auto;
  bottom: 92px;
  width: auto;
  max-width: min(86vw, 380px);
  padding: 7px 9px;
  border: 1px solid rgba(255, 221, 142, 0.66);
  border-radius: 13px;
  background: rgba(10, 23, 36, 0.88);
  color: #ffe7b8;
  box-shadow: 0 10px 26px rgba(0, 0, 0, 0.26);
  font: 700 10px/1.18 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  white-space: pre-wrap;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  pointer-events: none;
 }

 .maps-load-toast.is-visible {
  opacity: 0.9;
  transform: translateY(0);
 }
 </style>
</head>
<body>
 <div class="fieldops-shell-root" data-page="map"></div>

 <main class="osmmaps-page" data-osmmaps-page data-version="1.0.12-top-attached-tools">
  <div id="OSMmaps" class="osmmaps-canvas" aria-label="UK walk marker map"></div>

  <section class="osmmaps-region-overlay" data-region-overlay hidden aria-label="Choose map region">
   <button class="osmmaps-overlay-backdrop" type="button" data-region-overlay-close aria-label="Close region chooser"></button>

   <article class="osmmaps-filter-card" aria-label="Map region filter">
    <header class="osmmaps-filter-header">
     <div>
      <p class="osmmaps-kicker">Filter</p>
      <h1>Choose region</h1>
     </div>

     <button class="osmmaps-small-button" type="button" data-region-overlay-close>Close</button>
    </header>

    <p class="osmmaps-filter-note">
     Only the selected region's walks are loaded.
    </p>

    <div class="osmmaps-region-list" data-region-list></div>
   </article>
  </section>

  <section class="osmpanes-details" data-selected-panel hidden aria-live="polite"></section>
 </main>

 <section class="map-quick-tools" data-map-quick-tools aria-label="Map quick tools">
  <div class="map-quick-tools__rail" id="mapQuickToolsRail">
   <a class="map-quick-tool is-dtt" href="../RFPages/dtt.html" aria-label="Open DTT services">
    <img src="../../../data/icons/dtt.svg?v=1.1.1" alt="" aria-hidden="true">
    <span>DTT</span>
   </a>

   <a class="map-quick-tool is-dab" href="../RFPages/dab.html" aria-label="Open DAB services">
    <img src="../../../data/icons/dab.svg?v=1.1.1" alt="" aria-hidden="true">
    <span>DAB</span>
   </a>

   <a class="map-quick-tool is-fm" href="../RFPages/fm.html" aria-label="Open FM services">
    <img src="../../../data/icons/fm.svg?v=1.1.1" alt="" aria-hidden="true">
    <span>FM</span>
   </a>

   <button
    class="map-quick-tool is-weather"
    type="button"
    data-weather-panel-open
    aria-expanded="false"
    aria-label="Open Preseli weather forecast"
   >
    <img src="../../../data/icons/weather.svg?v=1.1.1" alt="" aria-hidden="true">
   </button>
  </div>

  <button
   class="map-quick-tools__toggle"
   type="button"
   data-map-quick-toggle
   aria-controls="mapQuickToolsRail"
   aria-expanded="true"
   aria-label="Collapse map quick tools"
  >
   <span class="map-quick-tools__toggle-mark" aria-hidden="true"></span>
  </button>
 </section>

 <aside class="weather-api-panel" aria-label="Preseli weather forecast" hidden>
  <header class="weather-api-panel-header">
   <div>
    <p class="weather-api-kicker">Weather</p>
    <h1>Preseli forecast</h1>
   </div>
   <button class="weather-api-mini-button" type="button" data-weather-panel-close aria-label="Close Preseli weather forecast">Close</button>
  </header>

  <p class="weather-api-copy">
   Preview only. Weather data is not requested until Activate is tapped.
  </p>

  <div class="weather-api-actions">
   <button class="weather-api-activate" type="button" data-weather-activate>
    Activate preview
   </button>
   <a class="weather-api-full-link" href="../Weather/index.html">Open full Weather</a>
  </div>

  <section class="weather-forecast-slider" aria-label="Preseli forecast slider">
   <header class="weather-forecast-header">
    <span>Preseli area</span>
    <span data-weather-forecast-updated>Not loaded</span>
   </header>

   <div class="weather-forecast-track" data-weather-forecast-track tabindex="0" role="list">
    <article class="weather-forecast-card weather-forecast-card-placeholder" role="listitem">
     Tap Activate.
    </article>
   </div>
  </section>

  <p class="weather-api-status" data-weather-output>v1.0.12-top-attached-tools</p>
 </aside>

 <div class="background-item" aria-hidden="true">
  <div class="atlas-top-fade"></div>
  <div class="atlas-top-fade atlas-bottom-fade"></div>
 </div>

 <script src="../../../shell.js?v=fade-restore-20260612g"></script>
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <script src="./OSMpanes.js?v=fade-restore-20260612g"></script>
 <script src="./OSMmaps.js?v=fade-restore-20260612g"></script>
 <script src="./OSMweather-menu.js?v=1.0.12-top-attached-tools"></script>
 <script>
 /* Maps load toast | Version: 1.0.12-top-attached-tools */
 (() => {
  "use strict";

  const PAGE_VERSION = "1.0.12-top-attached-tools";
  const TOAST_ID = "mapsLoadToast";

  function versionOf(globalName) {
   const globalValue = window[globalName];

   if (!globalValue) {
    return "missing";
   }

   return globalValue.VERSION || globalValue.version || "loaded";
  }

  function leafletVersion() {
   return window.L && window.L.version ? window.L.version : versionOf("L");
  }

  function showToast() {
   const existingToast = document.getElementById(TOAST_ID);

   if (existingToast) {
    existingToast.remove();
   }

   const toast = document.createElement("div");

   toast.id = TOAST_ID;
   toast.className = "maps-load-toast";
   toast.setAttribute("role", "status");
   toast.setAttribute("aria-live", "polite");

   const lines = [
    `index.html ${PAGE_VERSION}`,
    "shell.css unversioned",
    "background.css fade-restore-20260612g",
    "leaflet.css 1.9.4",
    "OSMmaps.css fade-restore-20260612g",
    "OSMpanes.css fade-restore-20260612g",
    "OSMweather-menu.css 1.0.12-top-attached-tools",
    `shell.js ${versionOf("FieldOpsEditor")}`,
    `leaflet.js ${leafletVersion()}`,
    `OSMpanes.js ${versionOf("FieldOpsOSMpanes")}`,
    `OSMmaps.js ${versionOf("FieldOpsOSMmaps")}`,
    `OSMweather-menu.js ${versionOf("FieldOpsOSMWeatherMenu")}`
   ];

   toast.textContent = lines.join("\n");
   document.body.appendChild(toast);

   requestAnimationFrame(() => {
    toast.classList.add("is-visible");
   });

   window.setTimeout(() => {
    toast.classList.remove("is-visible");
   }, 6500);

   window.setTimeout(() => {
    toast.remove();
   }, 7000);
  }

  if (document.readyState === "loading") {
   document.addEventListener("DOMContentLoaded", () => {
    window.setTimeout(showToast, 450);
   }, { once: true });
  } else {
   window.setTimeout(showToast, 450);
  }
 })();
 </script>
</body>
</html>
