<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FieldOps Atlas Network</title>
  <link rel="stylesheet" href="../RF/shell.css?v=1.1.1" />
  <link rel="stylesheet" href="../RF/page.css?v=1.1.1" />
</head>

<body>
  <main class="phone" data-page="network" data-nav="network" data-version="1.1.1">
    <section class="content-canvas" aria-label="FieldOps Atlas Network content">
      <article class="page-content">
        <header class="page-head">
          <div class="page-kicker">Topology</div>
          <h1 class="page-title">Network</h1>
          <p class="page-lede">View link topology, online paths, degraded branches, and route health.</p>
        </header>

        <section class="card">
          <h2 class="card-title">Network topology</h2>
          <div class="topology">
            <svg viewBox="0 0 300 220" fill="none">
              <path d="M55 110 135 55 235 92 188 170 88 165 55 110Z" stroke="#48c7ff" stroke-width="2" opacity=".72"/>
              <path d="M135 55 150 118 188 170M55 110 150 118 235 92" stroke="#9be8ff" stroke-width="1.4" opacity=".45"/>
              <g fill="#0f5fab" stroke="#ffdda0" stroke-width="2">
                <circle cx="55" cy="110" r="12"/><circle cx="135" cy="55" r="12"/><circle cx="235" cy="92" r="12"/><circle cx="188" cy="170" r="12"/><circle cx="88" cy="165" r="12"/><circle cx="150" cy="118" r="12"/>
              </g>
            </svg>
          </div>
        </section>

        <section class="card">
          <h2 class="card-title">Link health</h2>
          <div class="metric-grid">
            <div class="metric"><strong>18</strong><span>Total</span></div>
            <div class="metric"><strong>16</strong><span>Good</span></div>
            <div class="metric"><strong>2</strong><span>Degraded</span></div>
          </div>
        </section>
      </article>
    </section>
  </main>

  <script src="../RF/shell.js?v=1.1.1"></script>
</body>
</html>
