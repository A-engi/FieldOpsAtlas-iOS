    .rf-load-toast {
      position: fixed;

      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translate(-50%, 7px);
      transition: opacity 0.22s ease, transform 0.22s ease;

    }

  <script>
    /* RF mountain status | Version: 1.1.249-builder-3-single-opaque-mesh-13k */
    (() => {
      "use strict";

      const TOAST_ID = "rfLoadToast";

      function showMountainStatus() {
        document.getElementById(TOAST_ID)?.remove();

        const graph = window.FieldOpsRFGraph;
        const toast = document.createElement("div");

        toast.id = TOAST_ID;
        toast.className = "rf-load-toast";
        toast.setAttribute("role", "status");
        toast.setAttribute("aria-live", "polite");
        toast.textContent = graph
          ? `RF mountain ${graph.VERSION} · ${graph.renderMeshes || 1} mesh`
          : "RF mountain failed to load";

        document.body.appendChild(toast);

        requestAnimationFrame(() => {
          toast.classList.add("is-visible");
        });

        window.setTimeout(() => {
          toast.classList.remove("is-visible");
        }, 2600);

        window.setTimeout(() => {
          toast.remove();
        }, 2900);
      }

      if (document.readyState === "loading") {
        document.addEventListener(
          "DOMContentLoaded",
          () => window.setTimeout(showMountainStatus, 350),
          { once: true }
        );
      } else {
        window.setTimeout(showMountainStatus, 350);
      }
    })();
  </script>
