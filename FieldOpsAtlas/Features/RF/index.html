<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <link rel="stylesheet" href="../../../shell.css?v=1.1.12-single-rf-doc">
  <link rel="stylesheet" href="./background.css?v=1.1.75-background-only">
  <link rel="stylesheet" href="./rf-topology.css?v=1.1.73-exact-new-file-names">

<body>
  <main class="phone" data-page="rf" data-nav="rf" data-version="1.1.75">
    <section class="content-canvas" aria-label="RF Atlas content">
      <article class="rf-home">
        <section class="rf-network" aria-labelledby="rfNetworkTitle">
          <div class="rf-network-head">
            <h1 class="rf-title" id="rfNetworkTitle">RF network map</h1>
            <div class="rf-tabs" aria-label="Network layer filter">
              <span class="rf-tab is-active">RF</span>
              <span class="rf-tab">IP</span>

              <span class="rf-tab">All</span>
            </div>
          </div>

          <div class="rf-map-recent">
            <div class="rf-map-paper">
              <div
                class="rf-map-stage"
                id="rfMapStage"
                data-rf-topology
                role="img"
                aria-label="RF network map"
              ></div>
            </div>

            <section class="rf-recent" aria-labelledby="rfRecentTitle">
              <div class="rf-recent-head">
                <h2 class="rf-recent-title" id="rfRecentTitle">
                  <span class="rf-clock" aria-hidden="true"></span>
                  <span>Recently opened</span>
                </h2>
                <a class="rf-viewall" href="../RFPages/sites.html">View all</a>
              </div>

              <div class="rf-recent-grid">
                <a class="rf-recent-card" href="../RFPages/sites.html">
                  <img src="../../../data/icons/sites.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">Hilltop<br>Relay</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>

                <a class="rf-recent-card" href="../RFPages/sites.html">
                  <img src="../../../data/icons/sites.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">Ridgeway<br>Relay</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>

                <a class="rf-recent-card" href="../RFPages/sites.html">
                  <img src="../../../data/icons/atlas-transmitter-gold.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">London<br>Core</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>

                <a class="rf-recent-card" href="../RFPages/sites.html">
                  <img src="../../../data/icons/sites.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">Pinewood<br>Remote</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>
              </div>
            </section>
          </div>
        </section>

      </article>
    </section>
  </main>

  <script>

      items: [

          title: "RF overview",
          subtitle: "RF network map and dashboard",
          href: "./index.html",
          keywords: ["overview", "dashboard", "network", "map"]
        },
        {
          id: "rf-sites",
          title: "Sites",
          subtitle: "RF site directory and status",
          href: "../RFPages/sites.html",
          keywords: ["site", "sites", "transmitter", "relay", "tx"]
        },
        {
          id: "rf-paths",
          title: "Paths",
          subtitle: "RF paths and link analysis",
          href: "../RFPages/paths.html",
          keywords: ["path", "paths", "link", "links", "microwave", "frequency"]
        },
        {

        },
        {
          id: "rf-dtt",
          title: "DTT services",
          subtitle: "Digital terrestrial television",
          href: "../RFPages/dtt.html",
          keywords: ["dtt", "mux", "multiplex", "television", "tv"]
        },
        {
          id: "rf-dab",
          title: "DAB services",
          subtitle: "Digital audio broadcasting",
          href: "../RFPages/dab.html",
          keywords: ["dab", "radio", "audio", "ensemble"]
        },
        {
          id: "rf-fm",
          title: "FM services",
          subtitle: "FM radio services",
          href: "../RFPages/fm.html",
          keywords: ["fm", "radio", "audio"]
        },
        {
          id: "rf-services",
          title: "All RF services",
          subtitle: "DTT, DAB, FM and service groups",
          href: "../RFPages/services.html",
          keywords: ["services", "more", "dtt", "dab", "fm"]
        },
        {
          id: "site-hilltop",
          title: "Hilltop Relay",
          subtitle: "Recently opened RF relay site",
          href: "../RFPages/sites.html#hilltop",
          keywords: ["hilltop", "relay", "site", "online"]
        },
        {
          id: "site-ridgeway",
          title: "Ridgeway Relay",

          keywords: ["ridgeway", "relay", "site", "online"]
        },
        {

          subtitle: "Recently opened core TX site",
          href: "../RFPages/sites.html#london-core",
          keywords: ["london", "core", "tx", "site", "transmitter"]
        },
        {
          id: "path-north-ridge-hilltop",
          title: "North Ridge to Hilltop",
          subtitle: "Selected RF path · 6.725 GHz",
          href: "../RFPages/paths.html#north-ridge-hilltop",
          keywords: ["north ridge", "hilltop", "6.725", "ghz", "horizontal", "path"]

  <script src="../../../shell.js?v=1.1.12-single-rf-doc" defer></script>
  <script src="./rf-interface.js?v=1.1.75-interface-owned-service-strip" defer></script>
  <script src="./rf-topology.js?v=1.1.73-exact-new-file-names" defer></script>
  <script src="./rf-path-builder.js?v=1.1.67-rf-path-builder-rename" defer></script>
  <script>
    /* RF load toast | Version: 1.1.75-interface-owns-services */
    (() => {
      "use strict";

      const PAGE_VERSION = "1.1.75";
      const TOAST_VERSION = "1.1.75-interface-owns-services";
      const TOAST_ID = "rfLoadToast";

      function versionOf(globalName) {
        return window[globalName]?.VERSION || "missing";
      }

      function makeToast() {
        const toast = document.createElement("div");
        toast.id = TOAST_ID;
        toast.setAttribute("role", "status");
        toast.setAttribute("aria-live", "polite");
        toast.style.cssText = [
          "position:fixed",
          "left:12px",
          "right:12px",
          "bottom:72px",
          "z-index:99999",
          "padding:10px 12px",
          "border:1px solid rgba(237,191,99,.62)",
          "border-radius:14px",
          "background:rgba(2,13,28,.92)",
          "color:#ffdda0",
          "font:700 11px/1.35 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif",
          "box-shadow:0 12px 28px rgba(0,0,0,.28)",
          "backdrop-filter:blur(10px)",
          "transition:opacity .25s ease,transform .25s ease",
          "opacity:0",
          "transform:translateY(8px)",
          "pointer-events:none"
        ].join(";");

        return toast;
      }

      function showToast() {
        const existing = document.getElementById(TOAST_ID);
        if (existing) {
          existing.remove();
        }

        const toast = makeToast();
        const lines = [
          `index.html ${PAGE_VERSION}`,
          `background.css 1.1.75-background-only`,
          `rf-interface.css 1.1.75-interface-owned-service-strip`,
          `rf-interface.js ${versionOf("FieldOpsRFInterface")}`,
          `rf-topology.css 1.1.73-exact-new-file-names`,
          `rf-topology.js ${versionOf("FieldOpsRFTopology")}`,
          `rf-path-builder.js ${versionOf("FieldOpsRFPathBuilder")}`
        ];

        toast.innerHTML = lines.join("<br>");
        document.body.appendChild(toast);

        requestAnimationFrame(() => {
          toast.style.opacity = "1";
          toast.style.transform = "translateY(0)";
        });

        window.setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateY(8px)";
        }, 6500);

        window.setTimeout(() => {
          toast.remove();
        }, 7000);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
          window.setTimeout(showToast, 450);
        }, { once: true });
      } else {
        window.setTimeout(showToast, 450);
      }
    })();
  </script>

</body>
</html>
