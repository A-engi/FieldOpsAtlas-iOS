    .rf-load-toast {
      position: fixed;
      z-index: 9999;
      left: 14px;
      right: auto;
      bottom: 92px;
      width: auto;
      max-width: min(86vw, 380px);
      padding: 7px 9px;

      font: 700 10px/1.18 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .rf-load-toast.is-visible {
      opacity: 0.9;
      transform: translateY(0);
    }
  </style>

  <script>
    /* RF load toast | Version: 1.1.156-two-simple-mountains */
    (() => {
      "use strict";

      const PAGE_VERSION = "1.1.156-two-simple-mountains";
      const TOAST_ID = "rfLoadToast";

      function versionOf(globalName) {
        const globalValue = window[globalName];

        if (!globalValue) {
          return "missing";
        }

        return globalValue.VERSION || globalValue.version || "loaded";
      }

      function showToast() {
        const existingToast = document.getElementById(TOAST_ID);

        if (existingToast) {
          existingToast.remove();
        }

        const toast = document.createElement("div");
        toast.id = TOAST_ID;
        toast.className = "rf-load-toast";
        toast.setAttribute("role", "status");
        toast.setAttribute("aria-live", "polite");

        const lines = [
          `index.html ${PAGE_VERSION}`,
          "shell.css 1.1.21-shell-smoke-controls",
          "background.css 1.1.76-graph-label",
          "rf-graph.css 1.1.85-network-topology",
          "rf-interface.css 1.1.120-pane-fit",
          `shell.js ${versionOf("FieldOpsEditor")}`,
          `rf-interface.js ${versionOf("FieldOpsRFInterface")}`,
          `rf-path-builder.js ${versionOf("FieldOpsRFPathBuilder")}`,
          `rf-graph.js ${versionOf("FieldOpsRFGraph")}`
        ];

        toast.textContent = lines.join("\n");
        document.body.appendChild(toast);

        requestAnimationFrame(() => {
          toast.classList.add("is-visible");
        });

        window.setTimeout(() => {
          toast.classList.remove("is-visible");
        }, 6500);

        window.setTimeout(() => {
          toast.remove();
        }, 7000);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
          window.setTimeout(showToast, 450);
        }, { once: true });
      } else {
        window.setTimeout(showToast, 450);
      }
    })();
  </script>
