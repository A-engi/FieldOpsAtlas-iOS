  <script>
    /* RF load toast | Version: 1.1.52-load-toast */
    (() => {
      "use strict";

      const PAGE_VERSION = "1.1.52";
      const TOAST_VERSION = "1.1.52-load-toast";
      const TOAST_ID = "rfLoadToast";

      function versionOf(globalName) {
        return window[globalName]?.VERSION || "missing";
      }

      function makeToast() {
        const toast = document.createElement("div");
        toast.id = TOAST_ID;
        toast.setAttribute("role", "status");
        toast.setAttribute("aria-live", "polite");
        toast.style.cssText = [
          "position:fixed",
          "left:12px",
          "right:12px",
          "bottom:72px",
          "z-index:99999",
          "padding:10px 12px",
          "border:1px solid rgba(237,191,99,.62)",
          "border-radius:14px",
          "background:rgba(2,13,28,.92)",
          "color:#ffdda0",
          "font:700 11px/1.35 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif",
          "box-shadow:0 12px 28px rgba(0,0,0,.28)",
          "backdrop-filter:blur(10px)",
          "transition:opacity .25s ease,transform .25s ease",
          "opacity:0",
          "transform:translateY(8px)",
          "pointer-events:none"
        ].join(";");

        return toast;
      }

      function showToast() {
        const existing = document.getElementById(TOAST_ID);
        if (existing) {
          existing.remove();
        }

        const toast = makeToast();
        const lines = [
          `RF index v${PAGE_VERSION}`,
          `toast ${TOAST_VERSION}`,
          `panes ${versionOf("FieldOpsRFPanes")}`,
          `map ${versionOf("FieldOpsRFNetworkMap")}`,
          `details ${versionOf("FieldOpsRFPathDetails")}`
        ];

        toast.innerHTML = lines.join("<br>");
        document.body.appendChild(toast);

        requestAnimationFrame(() => {
          toast.style.opacity = "1";
          toast.style.transform = "translateY(0)";
        });

        window.setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateY(8px)";
        }, 6500);

        window.setTimeout(() => {
          toast.remove();
        }, 7000);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
          window.setTimeout(showToast, 450);
        }, { once: true });
      } else {
        window.setTimeout(showToast, 450);
      }
    })();
  </script>
