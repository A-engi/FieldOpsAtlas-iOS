<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FieldOps Atlas RF v1.1.33</title>
  <link rel="stylesheet" href="../../../shell.css?v=1.1.12-single-rf-doc">
  <link rel="stylesheet" href="./rf.css?v=1.1.28-map-stage-tracks-pane">
  <link rel="stylesheet" href="./rf-pane.css?v=1.1.32-clean-path-pane-layering">
  <link rel="stylesheet" href="./background.css?v=1.1.33-compass-in-map-background">
</head>
<body>
  <main class="phone" data-page="rf" data-nav="rf" data-version="1.1.33">
    <section class="content-canvas" aria-label="RF Atlas content">
      <article class="rf-home">
        <section class="rf-network" aria-labelledby="rfNetworkTitle">
          <div class="rf-network-head">
            <h1 class="rf-title" id="rfNetworkTitle">RF network map</h1>
            <div class="rf-tabs" aria-label="Network layer filter">
              <span class="rf-tab is-active">RF</span>
              <span class="rf-tab">IP</span>
              <span class="rf-tab">MW</span>
              <span class="rf-tab">All</span>
            </div>
          </div>

          <div class="rf-map-recent">
            <div class="rf-map-paper">
              <div
                class="rf-map-stage"
                id="rfMapStage"
                data-rf-network-map
                role="img"
                aria-label="RF network map"
              ></div>
            </div>

            <section class="rf-recent" aria-labelledby="rfRecentTitle">
              <div class="rf-recent-head">
                <h2 class="rf-recent-title" id="rfRecentTitle">
                  <span class="rf-clock" aria-hidden="true"></span>
                  <span>Recently opened</span>
                </h2>
                <a class="rf-viewall" href="./sites.html">View all</a>
              </div>

              <div class="rf-recent-grid">
                <a class="rf-recent-card" href="./sites.html">
                  <img src="../../../data/icons/sites.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">Hilltop<br>Relay</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>

                <a class="rf-recent-card" href="./sites.html">
                  <img src="../../../data/icons/sites.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">Ridgeway<br>Relay</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>

                <a class="rf-recent-card" href="./sites.html">
                  <img src="../../../data/icons/atlas-transmitter-gold.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">London<br>Core</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>

                <a class="rf-recent-card" href="./sites.html">
                  <img src="../../../data/icons/sites.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
                  <span>
                    <span class="rf-recent-name">Pinewood<br>Remote</span>
                    <span class="rf-status">Online</span>
                  </span>
                </a>
              </div>
            </section>
          </div>
        </section>

        <div class="rf-bottom">
          <section class="rf-small" aria-labelledby="rfServicesTitle">
            <h2 class="rf-small-title" id="rfServicesTitle">Services</h2>
            <table class="rf-table">
              <thead>
                <tr>
                  <th scope="col">Service</th>
                  <th scope="col">Type</th>
                  <th scope="col">Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><a href="./dtt.html">DTT MUX 1</a></td>
                  <td>DTT</td>
                  <td><span class="status">Online</span></td>
                </tr>
                <tr>
                  <td><a href="./dab.html">DAB National</a></td>
                  <td>DAB</td>
                  <td><span class="status">Online</span></td>
                </tr>
                <tr>
                  <td><a href="./fm.html">FM Service</a></td>
                  <td>FM</td>
                  <td><span class="status">Online</span></td>
                </tr>
              </tbody>
            </table>
          </section>

          <section class="rf-small" aria-labelledby="rfEquipmentTitle">
            <h2 class="rf-small-title" id="rfEquipmentTitle">Equipment</h2>
            <div class="rf-equipment">
              <a class="rf-equipment-item" href="./equipment.html">
                <strong>2</strong>
                <span>TX</span>
              </a>
              <a class="rf-equipment-item" href="./equipment.html">
                <strong>3</strong>
                <span>ANT</span>
              </a>
              <a class="rf-equipment-item" href="./paths.html">
                <strong>2</strong>
                <span>Links</span>
              </a>
            </div>
          </section>
        </div>
      </article>
    </section>
  </main>

  <script>
    window.FieldOpsSearchQueue = window.FieldOpsSearchQueue || [];
    window.FieldOpsSearchQueue.push({
      page: "rf",
      label: "RF",
      placeholder: "Search RF...",
      emptyText: "No RF matches found.",
      items: [
        {
          id: "rf-overview",
          title: "RF overview",
          subtitle: "RF network map and dashboard",
          href: "./index.html",
          keywords: ["overview", "dashboard", "network", "map"]
        },
        {
          id: "rf-sites",
          title: "Sites",
          subtitle: "RF site directory and status",
          href: "./sites.html",
          keywords: ["site", "sites", "transmitter", "relay", "tx"]
        },
        {
          id: "rf-paths",
          title: "Paths",
          subtitle: "RF paths and link analysis",
          href: "./paths.html",
          keywords: ["path", "paths", "link", "links", "microwave", "frequency"]
        },
        {
          id: "rf-equipment",
          title: "Equipment",
          subtitle: "Transmitters, antennas, receivers",
          href: "./equipment.html",
          keywords: ["equipment", "tx", "antenna", "receiver", "rack"]
        },
        {
          id: "rf-dtt",
          title: "DTT services",
          subtitle: "Digital terrestrial television",
          href: "./dtt.html",
          keywords: ["dtt", "mux", "multiplex", "television", "tv"]
        },
        {
          id: "rf-dab",

          keywords: ["dab", "radio", "audio", "ensemble"]
        },
        {
          id: "rf-fm",
          title: "FM services",

          href: "./fm.html",
          keywords: ["fm", "radio", "audio"]
        },
        {
          id: "rf-services",
          title: "All RF services",
          subtitle: "DTT, DAB, FM and service groups",
          href: "./services.html",
          keywords: ["services", "more", "dtt", "dab", "fm"]
        },
        {
          id: "site-hilltop",
          title: "Hilltop Relay",
          subtitle: "Recently opened RF relay site",
          href: "./sites.html#hilltop",
          keywords: ["hilltop", "relay", "site", "online"]
        },
        {
          id: "site-ridgeway",
          title: "Ridgeway Relay",
          subtitle: "Recently opened RF relay site",
          href: "./sites.html#ridgeway",
          keywords: ["ridgeway", "relay", "site", "online"]
        },
        {
          id: "site-london-core",
          title: "London Core",
          subtitle: "Recently opened core TX site",
          href: "./sites.html#london-core",
          keywords: ["london", "core", "tx", "site", "transmitter"]
        },
        {
          id: "path-north-ridge-hilltop",
          title: "North Ridge to Hilltop",
          subtitle: "Selected RF path Â· 6.725 GHz",
          href: "./paths.html#north-ridge-hilltop",
          keywords: ["north ridge", "hilltop", "6.725", "ghz", "horizontal", "path"]
        }
      ]
    });
  </script>

  <script src="../../../shell.js?v=1.1.12-single-rf-doc" defer></script>
  <script src="./rf-panes.js?v=1.1.32-clean-path-details-loader" defer></script>
  <script src="./rf-network-map.js?v=1.1.33-clean-map-insets-original-nodes" defer></script>
</body>
</html>
