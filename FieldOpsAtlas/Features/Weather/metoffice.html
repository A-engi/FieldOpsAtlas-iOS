<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Met Office Map Images · FieldOps Atlas Weather</title>
  <link rel="stylesheet" href="styles.css?v=0.3.2-provider-test-clean" />
  <link rel="stylesheet" href="metoffice.css?v=0.4.1-single-colour" />
</head>
<body class="metoffice-redo-page">
  <main class="mo-shell" data-page="metoffice">
    <header class="mo-topbar">
      <a class="mo-nav" href="openmeteo.html">‹ Open-Meteo</a>
      <div>
        <p class="mo-eyebrow">Weather API</p>
        <h1>Met Office Map Images</h1>
      </div>
      <a class="mo-nav" href="ea-rainfall.html">EA gauges ›</a>
    </header>

    <nav class="provider-tabs mo-tabs" aria-label="Weather provider screens">
      <a class="provider-tab" href="rainviewer.html">RainViewer</a>
      <a class="provider-tab" href="openmeteo.html">Open-Meteo</a>
      <a class="provider-tab active" href="metoffice.html">Met Office</a>
      <a class="provider-tab" href="ea-rainfall.html">EA gauges</a>
    </nav>

    <section class="mo-setup" aria-label="Met Office local credentials">
      <label>
        <span>Map Images key</span>
        <input id="moApiKey" type="password" autocomplete="off" placeholder="Stored in this browser only" />
      </label>
      <label>
        <span>Order ID</span>
        <input id="moOrderId" type="text" autocomplete="off" placeholder="Stored in this browser only" />
      </label>
      <div class="mo-button-row">
        <button id="moSaveSettings" class="mo-primary" type="button">Save</button>
        <button id="moForgetSettings" class="mo-secondary" type="button">Forget</button>
        <button id="moRefreshOrder" class="mo-secondary" type="button">Refresh order</button>
      </div>
    </section>

    <section class="mo-controls" aria-label="Met Office frame controls">
      <div class="mo-layer-buttons" role="group" aria-label="Layer type">
        <button class="mo-layer-button" type="button" data-layer="rainfall">Rainfall</button>
        <button class="mo-layer-button" type="button" data-layer="cloud">Cloud</button>
        <button class="mo-layer-button" type="button" data-layer="pressure">Pressure</button>
        <button class="mo-layer-button" type="button" data-layer="temperature">Temp</button>
      </div>
      <div class="mo-frame-controls">
        <button id="moPrevFrame" class="mo-secondary" type="button">‹</button>
        <input id="moFrameSlider" type="range" min="0" max="0" value="0" />
        <button id="moNextFrame" class="mo-secondary" type="button">›</button>
      </div>
    </section>

    <section class="mo-stage" aria-label="Met Office image preview">
      <img id="moImage" class="mo-image" alt="Met Office Map Images preview" hidden />
      <div id="moPlaceholder" class="mo-empty-state">
        <strong>Met Office image</strong>
        <span>Paste your local key/order, then load a frame. This screen does not use an OSM map.</span>
      </div>
    </section>

    <footer class="mo-statusbar" aria-live="polite">
      <span id="moStatus">Ready.</span>
      <span id="moFrameCount">0/0</span>
      <span id="moValidUkLabel">UK time unavailable</span>
    </footer>
  </main>

  <script src="weather-display-style.js?v=0.1.2"></script>
  <script src="app.js?v=0.3.0-demapped-weather-apis"></script>
  <script src="metoffice.js?v=0.4.1-single-colour"></script>
</body>
</html>
<!-- End of file: FieldOpsAtlas/Features/Weather/metoffice.html -->
