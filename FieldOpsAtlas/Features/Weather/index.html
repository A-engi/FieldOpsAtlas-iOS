<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
 <meta name="theme-color" content="#061426">
 <title>FieldOps Atlas · Weather</title>

 <link rel="stylesheet" href="../../../shell.css">
 <link rel="stylesheet" href="../maps/background.css?v=weather-map-icon-20260616">
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
 <link rel="stylesheet" href="../maps/OSMmaps.css?v=weather-map-icon-20260616">
 <link rel="stylesheet" href="../maps/OSMpanes.css?v=weather-map-icon-20260616">
 <link rel="stylesheet" href="./weather-api-panel.css?v=weather-map-icon-20260616">
</head>
<body>
 <div class="fieldops-shell-root" data-page="weather"></div>

 <main class="osmmaps-page" data-osmmaps-page data-weather-map-page>
  <div id="OSMmaps" class="osmmaps-canvas" aria-label="FieldOps Atlas weather map"></div>

  <section class="osmmaps-region-overlay" data-region-overlay hidden aria-label="Choose map region">
   <button class="osmmaps-overlay-backdrop" type="button" data-region-overlay-close aria-label="Close region chooser"></button>

   <article class="osmmaps-filter-card" aria-label="Map region filter">
    <header class="osmmaps-filter-header">
     <div>
      <p class="osmmaps-kicker">Filter</p>
      <h1>Choose region</h1>
     </div>

     <button class="osmmaps-small-button" type="button" data-region-overlay-close>Close</button>
    </header>

    <p class="osmmaps-filter-note">
     Only the selected region's walks are loaded.
    </p>

    <div class="osmmaps-region-list" data-region-list></div>
   </article>
  </section>

  <section class="osmpanes-details" data-selected-panel hidden aria-live="polite"></section>
 </main>

 <section class="weather-map-theme" aria-label="Map appearance">
  <button class="weather-map-theme-button" type="button" data-weather-theme="dark" aria-pressed="false">Dark</button>
  <button class="weather-map-theme-button" type="button" data-weather-theme="light" aria-pressed="false">Light</button>
 </section>

 <button class="weather-map-icon-button" type="button" data-weather-panel-open aria-label="Open weather API checks">
  <span aria-hidden="true">☁</span>
 </button>

 <aside class="weather-api-panel" aria-label="Weather API checks" hidden>
  <header class="weather-api-panel-header">
   <div>
    <p class="weather-api-kicker">Weather</p>
    <h1>API checks</h1>
   </div>
   <button class="weather-api-mini-button" type="button" data-weather-panel-close aria-label="Close weather API checks">Close</button>
  </header>

  <p class="weather-api-copy">
   Uses the existing Atlas OSM map. Select a marker, then run a source check. Provider-owned maps and weather-map previews are not rendered here.
  </p>

  <div class="weather-api-sources" aria-label="Weather source actions">
   <button class="weather-api-source" type="button" data-weather-source="openmeteo">Open-Meteo site risk</button>
   <button class="weather-api-source" type="button" data-weather-source="rainviewer">RainViewer metadata</button>
   <button class="weather-api-source" type="button" data-weather-source="metoffice">Met Office order list</button>
   <button class="weather-api-source" type="button" data-weather-source="ea">EA rain gauges</button>
  </div>

  <div class="weather-api-fields" data-weather-metoffice-fields hidden>
   <label class="weather-api-field">
    DataHub API key
    <input type="password" autocomplete="off" data-metoffice-key placeholder="Typed locally only">
   </label>

   <label class="weather-api-field">
    API Order ID
    <input type="text" data-metoffice-order placeholder="Example: maps-uk1">
   </label>
  </div>

  <pre class="weather-api-output" data-weather-output>Select a marker, then choose a weather source.</pre>
 </aside>

 <div class="background-item" aria-hidden="true">
  <div class="atlas-top-fade"></div>
  <div class="atlas-top-fade atlas-bottom-fade"></div>
 </div>

 <script src="../../../shell.js?v=weather-map-icon-20260616"></script>
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <script src="../maps/OSMpanes.js?v=weather-map-icon-20260616"></script>
 <script src="../maps/OSMmaps.js?v=weather-map-icon-20260616"></script>
 <script src="./weather-api-panel.js?v=weather-map-icon-20260616"></script>
</body>
</html>
<!-- End of file: FieldOpsAtlas/Features/Weather/index.html -->
