<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FieldOps Atlas Weather Map v0.3.5</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css?v=0.3.5-stadia-smooth-base-filter" />
</head>
<body class="weather-map-body">
  <main class="weather-map-shell" data-page="weather-map">
    <header class="weather-map-header">
      <a class="back-link" href="../maps/index.html">Atlas Map</a>
      <div>
        <p class="eyebrow">Weather map</p>
        <h1>Stadia Smooth base test</h1>
      </div>
      <span class="version-pill">v0.3.5</span>
    </header>

    <section class="weather-map-stage" aria-label="Weather map with smooth basemap">
      <div id="weatherMap" class="weather-map-canvas weather-map-base-filter" aria-label="Stadia Alidade Smooth weather basemap"></div>

      <aside class="weather-map-float" aria-label="Weather map controls">
        <p class="eyebrow">Base</p>
        <h2>Alidade Smooth</h2>
        <p id="weatherMapStatus">Loading smooth basemap...</p>

        <label class="field-label" for="stadiaApiKey">Stadia key, optional</label>
        <input id="stadiaApiKey" class="text-input" type="password" autocomplete="off" placeholder="Use domain auth or paste key" />

        <div class="button-row">
          <button id="saveStadiaKey" class="primary-button" type="button">Save key</button>
          <button id="clearStadiaKey" class="secondary-button" type="button">Clear</button>
        </div>

        <p class="source-note">The colour filter is applied to the basemap pane before any weather overlay loads. Future rain layers sit above it unfiltered.</p>
      </aside>

      <nav class="weather-map-provider-links" aria-label="Weather provider tests">
        <a href="rainviewer.html">RainViewer</a>
        <a href="openmeteo.html">Open-Meteo</a>
        <a href="metoffice.html">Met Office</a>
        <a href="ea-rainfall.html">EA gauges</a>
      </nav>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="weather-map.js?v=0.3.5-stadia-smooth-base-filter"></script>
</body>
</html>
