<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RainViewer Radar Frames - FieldOps Atlas Weather</title>
  <link rel="stylesheet" href="styles.css?v=0.3.2-provider-test-clean" />
</head>
<body>
  <main class="lab-shell provider-shell" data-page="rainviewer">
    <header class="lab-header">
      <a class="back-link" href="../maps/index.html">Atlas Map</a>
      <div>
        <h1>RainViewer radar frames</h1>
      </div>
      <span class="version-pill">v0.3.2</span>
    </header>

    <nav class="provider-tabs" aria-label="Weather provider screens">
      <a class="provider-tab active" href="rainviewer.html">RainViewer</a>
      <a class="provider-tab" href="openmeteo.html">Open-Meteo</a>
      <a class="provider-tab" href="metoffice.html">Met Office</a>
      <a class="provider-tab" href="ea-rainfall.html">EA gauges</a>
    </nav>

    <section class="hero-card provider-card-stack">
      <div>
        <h2>Radar frames</h2>
      </div>
      <button id="loadRadarButton" class="primary-button" type="button">Load RainViewer frames</button>
    </section>

    <section class="weather-data-card" aria-live="polite">
      <div class="weather-card-header">
        <div>
          <h2 id="radarFrameCount">0 frames</h2>
        </div>
        <span id="radarTimeLabel" class="metric-pill">Not loaded</span>
      </div>
      <input id="radarFrameRange" class="range-control" type="range" min="0" max="0" value="0" disabled />
      <p id="statusText" class="status-text">Ready.</p>
      <pre id="tileTemplate" class="code-panel">No frame selected.</pre>
    </section>

    <section class="weather-data-card">
      <h2>Available frames</h2>
      <div id="frameList" class="compact-list"></div>
    </section>
  </main>

  <script src="weather-display-style.js?v=0.1.2"></script>
  <script src="app.js?v=0.3.0-demapped-weather-apis"></script>
  <script src="rainviewer.js?v=0.3.0-demapped-weather-apis"></script>
</body>
</html>
