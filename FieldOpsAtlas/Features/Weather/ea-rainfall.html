<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EA Rainfall Gauges - FieldOps Atlas Weather</title>
  <link rel="stylesheet" href="styles.css?v=0.3.2-provider-test-clean" />
</head>
<body>
  <main class="lab-shell provider-shell" data-page="ea-rainfall">
    <header class="lab-header">
      <a class="back-link" href="metoffice.html">Met Office</a>
      <div>
        <h1>EA rainfall gauges</h1>
      </div>
      <a class="back-link" href="rainviewer.html">RainViewer</a>
    </header>

    <nav class="provider-tabs" aria-label="Weather provider screens">
      <a class="provider-tab" href="rainviewer.html">RainViewer</a>
      <a class="provider-tab" href="openmeteo.html">Open-Meteo</a>
      <a class="provider-tab" href="metoffice.html">Met Office</a>
      <a class="provider-tab active" href="ea-rainfall.html">EA gauges</a>
    </nav>

    <section class="hero-card provider-card-stack">
      <div>
        <h2>Nearby rainfall gauges</h2>
      </div>
      <div class="button-row">
        <button id="clearGaugesButton" class="secondary-button" type="button">Clear</button>
        <button id="loadGaugesButton" class="primary-button" type="button">Load</button>
      </div>
    </section>

    <section class="weather-data-card">
      <div class="weather-card-header">
        <div>
          <h2>Site</h2>
        </div>
        <label class="field-label" for="siteSelect">Sample site</label>
      </div>
      <select id="siteSelect" class="text-input"></select>
      <label class="field-label" for="distanceRange">Radius <span id="distanceLabel">40 km</span></label>
      <input id="distanceRange" type="range" min="5" max="100" value="40" step="5" />
      <p id="statusText" class="status-text">Ready.</p>
    </section>

    <section class="weather-data-card">
      <h2>Gauges</h2>
      <div id="gaugeList" class="risk-list"></div>
    </section>
  </main>

  <script src="weather-display-style.js?v=0.1.2"></script>
  <script src="app.js?v=0.3.0-demapped-weather-apis"></script>
  <script src="ea-rainfall.js?v=0.3.0-demapped-weather-apis"></script>
</body>
</html>
