<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RF Atlas Paths</title>
  <link rel="stylesheet" href="shell.css" />
  <link rel="stylesheet" href="page.css" />
</head>

<body>
  <main class="phone" data-page="paths" data-nav="rf" data-version="0.1.35">
    <section class="content-canvas" aria-label="RF Atlas Paths content">
      <article class="page-content">
        <header class="page-head">
          <div class="page-kicker">Signal routes</div>
          <h1 class="page-title">Paths</h1>
          <p class="page-lede">RF path cards for distance, bearing, service carriage, and link margin.</p>
        </header>

        <section class="card is-dark">
          <h2 class="card-title">Selected path</h2>
          <div class="metric-grid">
            <div class="metric"><strong>37.6</strong><span>km</span></div>
            <div class="metric"><strong>123°</strong><span>Azimuth</span></div>
            <div class="metric"><strong>18.6</strong><span>dB</span></div>
          </div>
        </section>

        <section class="card">
          <h2 class="card-title">Active paths</h2>
          <div class="list">
            <a class="list-row" href="rf.html"><span class="row-icon">↗</span><span><b class="row-title">London Core → Hilltop Relay</b><div class="row-sub">DTT MUX 1 · horizontal</div></span><span class="status">Good</span></a>
            <a class="list-row" href="rf.html"><span class="row-icon">↘</span><span><b class="row-title">Manchester → Ridgeway</b><div class="row-sub">DAB backhaul · vertical</div></span><span class="status warn">Watch</span></a>
          </div>
        </section>
      </article>
    </section>
  </main>

  <script src="shell.js"></script>
</body>
</html>
