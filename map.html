<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Atlas Map Bridge v0.1.55</title>
  <style>
    :root {
      --atlas-bg: #031020;
      --atlas-gold: #edbf63;
      --atlas-text: #fffaf0;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(237, 191, 99, 0.16), transparent 34%),
        linear-gradient(180deg, #031020 0%, #06172a 52%, #04111f 100%);
      color: var(--atlas-text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .map-bridge {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      background: #031020;
    }

    .map-bridge-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #031020;
    }

    .map-bridge-fallback {
      position: absolute;
      inset: 0;
      z-index: -1;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(237, 191, 99, 0.18), transparent 38%),
        linear-gradient(180deg, #06182b, #031020);
    }

    .map-bridge-card {
      width: min(360px, calc(100vw - 32px));
      padding: 18px;
      border: 1px solid rgba(237, 191, 99, 0.55);
      border-radius: 18px;
      background: rgba(6, 24, 43, 0.92);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
    }

    .map-bridge-card h1 {
      margin: 0 0 8px;
      color: #fffdf7;
      font-size: 18px;
      line-height: 1.2;
    }

    .map-bridge-card p {
      margin: 0 0 14px;
      color: rgba(255, 250, 240, 0.78);
      font-size: 13px;
      line-height: 1.45;
    }

    .map-bridge-card a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      color: #031020;
      background: linear-gradient(180deg, #ffdda0, var(--atlas-gold));
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="map-bridge" aria-label="Atlas map">
    <iframe
      class="map-bridge-frame"
      title="Atlas map"
      src="./features/map/index.html"
      loading="eager"
      referrerpolicy="same-origin"
      allow="fullscreen; geolocation">
    </iframe>

    <section class="map-bridge-fallback" aria-hidden="true">
      <div class="map-bridge-card">
        <h1>Atlas map</h1>
        <p>The map lives in <strong>features/map/</strong>. If the frame does not open, use the direct local map page.</p>
        <a href="./features/map/index.html">Open map</a>
      </div>
    </section>
  </main>
</body>
</html>
